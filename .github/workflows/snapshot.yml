name: Weekly TDCC snapshot

on:
  schedule:
    # Daily at 02:00 UTC = 10:00 CST.
    # TDCC publishes weekly on Fridays; running daily is a zero-cost safety
    # net against a TDCC release delay. The download script is idempotent —
    # if the current snapshot is already archived, no commit is created.
    - cron: "0 2 * * *"
  workflow_dispatch:   # manual trigger from the Actions tab

permissions:
  contents: write   # needed to push new snapshots back to main

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests pandas

      - name: Download current week snapshot
        id: download
        run: python scripts/download.py

      - name: Commit new snapshot if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if git diff --cached --quiet; then
            echo "no new snapshot this run"
            exit 0
          fi
          # Pick up the first added/modified CSV to derive the commit message.
          added=$(git diff --cached --name-only --diff-filter=AM \
                  | grep -E 'snapshots/.+\.csv$' | head -1)
          filename=$(basename "$added" .csv)
          git commit -m "data: archive TDCC snapshot ${filename}"
          git push
